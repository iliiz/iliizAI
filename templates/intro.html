<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Premium Space</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #030712; 
    }

    @keyframes earthRotate {
      0% { background-position: 0 0; }
      100% { background-position: 400px 0; }
    }

    .animate-earth {
      animation: earthRotate 30s linear infinite;
    }

    @keyframes twinkle { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }
    .twinkle-normal { animation: twinkle 3s infinite; }
    .twinkle-slow { animation: twinkle 4.5s infinite; }
    .twinkle-fast { animation: twinkle 1.5s infinite; }
  </style>
</head>
<body class="w-full min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden relative">

  <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="absolute top-[10%] left-[15%] w-1 h-1 bg-white rounded-full twinkle-normal"></div>
    <div class="absolute top-[25%] left-[80%] w-[2px] h-[2px] bg-white rounded-full twinkle-slow"></div>
    <div class="absolute top-[40%] left-[45%] w-1 h-1 bg-white rounded-full twinkle-fast"></div>
    <div class="absolute top-[75%] left-[20%] w-[2px] h-[2px] bg-white rounded-full twinkle-slow"></div>
    <div class="absolute top-[85%] left-[70%] w-1 h-1 bg-white rounded-full twinkle-normal"></div>
    <div class="absolute top-[60%] left-[85%] w-1 h-1 bg-white rounded-full twinkle-fast"></div>
    <div class="absolute top-[15%] left-[50%] w-[3px] h-[3px] bg-indigo-200 rounded-full twinkle-slow"></div>
    <div class="absolute top-[70%] left-[5%] w-1 h-1 bg-white rounded-full twinkle-normal"></div>
  </div>

  <div class="relative z-10 flex flex-col items-center text-center max-w-2xl mx-auto">
    
    <div class="relative mb-8 md:mb-12">
      <div class="absolute inset-0 rounded-full bg-blue-500/10 blur-[50px] scale-125 pointer-events-none"></div>
      
      <div 
        class="animate-earth w-[260px] h-[260px] md:w-[300px] md:h-[300px] rounded-full overflow-hidden transition-all duration-700"
        style="
          background-image: url('https://pub-940ccf6255b54fa799a9b01050e6c227.r2.dev/globe.jpeg');
          background-size: cover;
          background-position: left;
          box-shadow: 
            0 0 30px rgba(255,255,255,0.1),
            -5px 0 12px #c3f4ff inset,
            20px 2px 30px #000 inset,
            -30px -2px 40px #c3f4ff99 inset,
            260px 0 50px #00000066 inset,
            160px 0 45px #000000aa inset;
        ">
      </div>
    </div>

    <h1 class="text-4xl md:text-6xl font-bold text-white tracking-tight leading-tight mb-4">
      ILIIZ AI <br>
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">
        Welcome
      </span>
    </h1>
    
    <p class="text-sm md:text-base text-gray-400 font-light max-w-md mx-auto mb-10 leading-relaxed">
      A premium space designed for secure transactions, live dynamic operations, and worldwide deployment.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full px-4">
      
      <a
        href="/signup"
        class="group relative w-full sm:w-44 h-12 flex items-center justify-center bg-white text-black font-semibold text-sm rounded-xl transition-all duration-300 hover:bg-gray-100 active:scale-[0.98] shadow-[0_4px_20px_rgba(255,255,255,0.15)]">
        Get Started
        <svg class="w-4 h-4 ml-2 transform transition-transform duration-300 group-hover:translate-x-1" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 8H15M15 8L8 1M15 8L8 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <a
        href="/signup" 
        class="w-full sm:w-44 h-12 flex items-center justify-center bg-white/5 hover:bg-white/10 text-white font-medium text-sm rounded-xl border border-white/10 hover:border-white/20 transition-all duration-300 active:scale-[0.98] backdrop-blur-md">
        Create Account
      </a>

    </div>

  </div>

</body>
</html>
